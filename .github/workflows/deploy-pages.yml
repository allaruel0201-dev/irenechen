name: Deploy GitHub Pages (dashboard)

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 01:15 UTC (09:15 Asia/Shanghai) as a safety net.
    - cron: "15 1 * * *"
  workflow_run:
    workflows: ["Publish dashboard"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dashboard data.js
        run: python3 scripts/build-dashboard.py

      - name: Prepare dashboard-only Pages artifact
        run: |
          rm -rf .pages-artifact
          mkdir -p .pages-artifact
          cp outputs/index.html .pages-artifact/index.html
          cp -R outputs/dashboard .pages-artifact/dashboard
          touch .pages-artifact/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages for this repo (avoids "Get Pages site failed: Not Found" on first run).
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
