name: Publish dashboard

on:
  push:
    branches: [main]
    paths:
      - "outputs/daily/**"
      - "scripts/build-dashboard.py"
      - "scripts/build-dashboard.mjs"
      - "scripts/publish-dashboard.py"
      - "outputs/dashboard/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-dashboard
  cancel-in-progress: true

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build + commit + push dashboard
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          python3 scripts/build-dashboard.py
          git add outputs/dashboard/data.js
          if [ -z "$(git status --porcelain)" ]; then
            echo "No dashboard changes."
            exit 0
          fi
          latest_date="$(ls -1 outputs/daily/*-topic-radar.md 2>/dev/null | sed 's#.*/\\([0-9]\\{4\\}-[0-9]\\{2\\}-[0-9]\\{2\\}\\)-topic-radar.md#\\1#' | sort | tail -n 1)"
          msg="dashboard: ${latest_date:-update}"
          git commit -m "$msg"
          git push

