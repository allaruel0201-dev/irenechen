<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selected Works</title>
    <style>
      :root {
        --bg: #050505;
        --surface: rgba(11, 12, 12, 0.68);
        --surface-strong: rgba(17, 18, 18, 0.84);
        --border: rgba(235, 239, 232, 0.16);
        --border-strong: rgba(235, 239, 232, 0.34);
        --text: #f4f2eb;
        --secondary: #d8d4c9;
        --muted: #aaa59b;
        --accent: #b8d7a5;
        --accent-soft: rgba(184, 215, 165, 0.15);
        --warm: #e0a480;
        --wechat: #4fd174;
        --wechat-soft: rgba(79, 209, 116, 0.16);
        --xhs: #f05f6f;
        --xhs-soft: rgba(240, 95, 111, 0.14);
        --shadow: 0 24px 58px rgba(0, 0, 0, 0.44);
        --font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        position: relative;
        isolation: isolate;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.34) 46%, rgba(0, 0, 0, 0.18)),
          linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.5));
      }

      .bg-gif {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        opacity: 0.92;
        filter: brightness(1.18) contrast(1.12);
        pointer-events: none;
      }

      a {
        color: inherit;
      }

      .page {
        position: relative;
        z-index: 2;
        width: min(100%, 1240px);
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(280px, 0.8fr) minmax(0, 1.2fr);
        gap: 48px;
        align-items: start;
        padding: 64px 32px;
      }

      .hero {
        position: sticky;
        top: clamp(250px, 39vh, 420px);
        max-width: 460px;
        padding: 26px 0;
        transform: translateX(clamp(-120px, -6vw, -72px));
      }

      .eyebrow {
        color: var(--warm);
        font-size: 12px;
        letter-spacing: 0.16em;
      }

      h1 {
        margin: 18px 0 0;
        font-size: 3.2rem;
        line-height: 1.05;
        font-weight: 680;
        letter-spacing: 0;
      }

      .intro {
        margin: 20px 0 0;
        color: var(--secondary);
        font-size: 16px;
        line-height: 1.76;
      }

      .hero-nav {
        display: grid;
        gap: 9px;
        margin-top: 18px;
      }

      .hero-nav-link {
        position: relative;
        display: inline-block;
        width: fit-content;
        max-width: 100%;
        padding-bottom: 5px;
        color: var(--wechat);
        font-size: 1.18rem;
        line-height: 1.26;
        font-weight: 720;
        letter-spacing: 0;
        text-decoration: none;
        transition: color 160ms ease, opacity 160ms ease;
      }

      .hero-nav-link::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.92;
      }

      .hero-nav-link.is-xiaohongshu {
        color: var(--xhs);
      }

      .hero-nav-link:hover {
        opacity: 0.78;
      }

      .hero-nav-link:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 4px;
        border-radius: 4px;
      }

      .works-panel {
        display: grid;
        gap: 34px;
      }

      .work-section {
        display: grid;
        gap: 14px;
        scroll-margin-top: 28px;
      }

      .work-section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 0 2px 10px;
        border-bottom: 1px solid rgba(235, 239, 232, 0.18);
      }

      .work-section-title {
        position: relative;
        margin: 0;
        color: var(--wechat);
        font-size: 1.42rem;
        line-height: 1.2;
        font-weight: 760;
        letter-spacing: 0;
      }

      .work-section-title::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -11px;
        width: 76px;
        height: 2px;
        border-radius: 999px;
        background: var(--wechat);
      }

      .work-section.is-xiaohongshu .work-section-title {
        color: var(--xhs);
      }

      .work-section.is-xiaohongshu .work-section-title::after {
        background: var(--xhs);
      }

      .work-count {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .work-list {
        display: grid;
        gap: 10px;
      }

      .work-card {
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px 18px;
        align-items: start;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018)),
          var(--surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background-color 180ms ease;
      }

      .work-card:hover {
        border-color: var(--border-strong);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.028)),
          var(--surface-strong);
        box-shadow: 0 28px 68px rgba(0, 0, 0, 0.58);
        transform: translateY(-2px);
      }

      .work-title {
        margin: 0;
        font-size: 1.08rem;
        line-height: 1.28;
        font-weight: 680;
        letter-spacing: 0;
      }

      .work-title a {
        display: inline-flex;
        align-items: baseline;
        gap: 8px;
        min-height: 32px;
        text-decoration: none;
        text-underline-offset: 5px;
        text-decoration-thickness: 1px;
        transition: color 160ms ease, opacity 160ms ease;
      }

      .work-title a:hover,
      .work-card:hover .work-title a {
        color: var(--accent);
        text-decoration: underline;
      }

      .work-title a:focus-visible {
        outline: 2px solid rgba(184, 215, 165, 0.64);
        outline-offset: 4px;
        border-radius: 4px;
      }

      .arrow-icon {
        flex: 0 0 auto;
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        opacity: 0.7;
        transform: translateY(2px);
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .work-title a:hover .arrow-icon,
      .work-card:hover .arrow-icon {
        opacity: 1;
        transform: translate(1px, 1px);
      }

      .work-summary {
        grid-column: 1 / -1;
        display: -webkit-box;
        margin: 0;
        overflow: hidden;
        color: var(--secondary);
        font-size: 14px;
        line-height: 1.65;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .work-data {
        justify-self: end;
        width: fit-content;
        max-width: 100%;
        margin: 0;
        padding: 7px 11px;
        border: 1px solid rgba(184, 215, 165, 0.26);
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        line-height: 1.35;
        font-weight: 650;
        white-space: nowrap;
      }

      .keyword-row {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .keyword-chip {
        padding: 4px 8px;
        border: 1px solid rgba(224, 164, 128, 0.24);
        border-radius: 999px;
        background: rgba(224, 164, 128, 0.1);
        color: #e7b493;
        font-size: 12px;
        line-height: 1.35;
        font-weight: 560;
      }

      .empty-section {
        padding: 18px 20px;
        border: 1px dashed rgba(235, 239, 232, 0.2);
        border-radius: 8px;
        color: var(--muted);
        background: rgba(11, 12, 12, 0.42);
        font-size: 13px;
        line-height: 1.65;
      }

      @media (max-width: 860px) {
        .page {
          grid-template-columns: 1fr;
          gap: 30px;
          align-items: start;
          padding: 34px 20px 44px;
        }

        .bg-gif {
          object-position: center center;
          opacity: 0.92;
          filter: brightness(1.16) contrast(1.12);
        }

        body::before {
          background:
            linear-gradient(180deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.24) 42%, rgba(0, 0, 0, 0.68)),
            linear-gradient(90deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.26));
        }

        .hero {
          position: relative;
          top: 0;
          max-width: 680px;
          padding: 8px 0 0;
          transform: none;
        }

        h1 {
          font-size: 2.35rem;
        }

        .work-section-title {
          font-size: 1.32rem;
        }
      }

      @media (max-width: 520px) {
        .page {
          padding: 28px 16px 36px;
        }

        h1 {
          font-size: 2rem;
        }

        .intro {
          font-size: 15px;
        }

        .work-card {
          grid-template-columns: 1fr;
          padding: 20px 18px 18px;
        }

        .work-title {
          font-size: 1.14rem;
        }

        .work-data {
          justify-self: start;
          white-space: normal;
        }

        .work-title a {
          width: 100%;
        }
      }
    </style>
  </head>

          url: "https://www.xiaohongshu.com/explore/66c53809000000001d039310?app_platform=android&ignoreEngage=true&app_version=9.30.0&share_from_user_hidden=true&xsec_source=app_share&type=normal&xsec_token=CBp1TM3j03YWvOoWB08DnXvRG_pqHXtst35SUutttKJ34=&author_share=1&xhsshare=&shareRedId=ODtDNjdLNTo2NzUyOTgwNjY7OTpIRjtO&apptime=1782716845&share_id=29e38ecbced24570bf5fb83fab201b4a&share_channel=wechat&wechatWid=02e52202f088bdc048373d775dbaa93a&wechatOrigin=menu"
        }
      ];

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function arrowUpRightIcon() {
        return `
          <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7 17L17 7"></path>
            <path d="M9 7h8v8"></path>
          </svg>
        `;
      }

      function renderWorkCards(items) {
        return items
          .map((work) => {
            const title = String(work.title || "").trim();
            const summary = String(work.summary || "").trim();
            const data = String(work.data || "").trim();
            const url = String(work.url || "").trim();
            const keywords = Array.isArray(work.keywords) ? work.keywords : [];

            return `
              <article class="work-card">
                <h2 class="work-title">
                  <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
                    <span>${escapeHtml(title)}</span>
                    ${arrowUpRightIcon()}
                  </a>
                </h2>
                ${data ? `<p class="work-data">${escapeHtml(data)}</p>` : ""}
                ${summary ? `<p class="work-summary">${escapeHtml(summary)}</p>` : ""}
                ${
                  keywords.length
                    ? `<div class="keyword-row">${keywords
                        .map((keyword) => `<span class="keyword-chip">${escapeHtml(keyword)}</span>`)
                        .join("")}</div>`
                    : ""
                }
              </article>
            `;
          })
          .join("");
      }

      function renderWorkSection(title, items, emptyText, type, id) {
        const count = items.length;
        return `
          <section id="${escapeHtml(id)}" class="work-section ${type ? `is-${escapeHtml(type)}` : ""}" aria-label="${escapeHtml(title)}">
            <div class="work-section-head">
              <h2 class="work-section-title">${escapeHtml(title)}</h2>
              <div class="work-count">${count} 篇</div>
            </div>
            ${
              count
                ? `<div class="work-list">${renderWorkCards(items)}</div>`
                : `<div class="empty-section">${escapeHtml(emptyText)}</div>`
            }
          </section>
        `;
      }

      function renderWorks() {
        document.getElementById("worksPanel").innerHTML = [
          renderWorkSection("公众号作品", wechatWorks, "公众号作品待补充。", "wechat", "wechatWorks"),
          renderWorkSection(
            "小红书作品（网页版需登录小红书后查看）",
            xiaohongshuWorks,
            "小红书作品待补充。",
            "xiaohongshu",
            "xiaohongshuWorks"
          )
        ].join("");
      }

      renderWorks();
    </script>
  </body>
</html>
